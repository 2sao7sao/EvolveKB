<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0B0F1A"/>
  <rect x="40" y="40" width="1120" height="320" rx="16" fill="#111827"/>
  <text x="80" y="100" fill="#F9FAFB" font-family="Arial, sans-serif" font-size="28" font-weight="700">Mode Comparison</text>
  <text x="80" y="140" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="16">How knowledge behaves under different modes</text>

  <g font-family="Arial, sans-serif" font-size="16">
    <text x="80" y="200" fill="#E5E7EB">Reference</text>
    <text x="260" y="200" fill="#9CA3AF">Use sources, avoid rewrites</text>

    <text x="80" y="240" fill="#E5E7EB">Digest</text>
    <text x="260" y="240" fill="#9CA3AF">Summarize into structured notes</text>

    <text x="80" y="280" fill="#E5E7EB">Transform</text>
    <text x="260" y="280" fill="#9CA3AF">Compile into procedures/playbooks</text>

    <text x="80" y="320" fill="#E5E7EB">Evolve</text>
    <text x="260" y="320" fill="#9CA3AF">Propose gated, versioned updates</text>
  </g>

  <rect x="800" y="150" width="280" height="160" rx="12" fill="#1F2937"/>
  <text x="820" y="190" fill="#F9FAFB" font-family="Arial, sans-serif" font-size="14" font-weight="600">Outputs visible</text>
  <text x="820" y="220" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="14">• Digest block</text>
  <text x="820" y="245" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="14">• Playbook draft</text>
  <text x="820" y="270" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="14">• Gate checklist</text>
</svg>
