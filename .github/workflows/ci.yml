name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run package validation gates
        env:
          MAX_SKILLS: "250"
          MAX_SKILL_MD_BYTES: "50000"
        run: |
          python -m evolvekb.cli validate --settings settings/evolve.yaml

      - name: Run legacy validation smoke
        run: |
          python scripts/validate.py --settings settings/evolve.yaml

      - name: Run tests
        run: |
          pytest
