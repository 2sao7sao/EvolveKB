name: Bug report
description: Report a reproducible EvolveKB problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, inputs, and relevant output.
      value: |
        ```bash
        python -m pytest -q
        ```
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - knowledge assets
        - usage playbooks
        - skills
        - gates
        - evals
        - CLI
        - documentation
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, install method.
