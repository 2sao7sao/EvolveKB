<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="650" viewBox="0 0 1180 650" role="img" aria-label="EvolveKB terminal demo screenshot">
  <defs>
    <linearGradient id="termBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12372f"/>
      <stop offset="100%" stop-color="#071d18"/>
    </linearGradient>
    <style>
      .chrome{fill:#102821;stroke:#7ca999;stroke-width:1.2}
      .dot{fill:#f4b35f}
      .dot2{fill:#df6a4f}
      .dot3{fill:#5fbf88}
      .title{font:700 18px 'Avenir Next','Trebuchet MS',sans-serif;fill:#dff5ed}
      .mono{font:500 18px 'SFMono-Regular','Menlo','Consolas',monospace;fill:#dff5ed}
      .muted{fill:#95b9ad}
      .ok{fill:#8ee3b0}
      .warn{fill:#ffd083}
      .accent{fill:#f4b35f}
    </style>
  </defs>
  <rect width="1180" height="650" rx="34" fill="#f4efe3"/>
  <rect x="42" y="42" width="1096" height="566" rx="24" fill="url(#termBg)" stroke="#93b8a9"/>
  <rect x="42" y="42" width="1096" height="58" rx="24" class="chrome"/>
  <circle cx="78" cy="71" r="8" class="dot2"/>
  <circle cx="104" cy="71" r="8" class="dot"/>
  <circle cx="130" cy="71" r="8" class="dot3"/>
  <text x="168" y="78" class="title">EvolveKB demo: static policy -> verified agent skill</text>
  <text x="74" y="136" class="mono accent">$ python examples/run_evolution_loop.py</text>
  <text x="74" y="182" class="mono muted">Demo workspace: /tmp/evolvekb-demo/EvolveKB</text>
  <text x="74" y="232" class="mono">$ python -m evolvekb.cli evolve doc examples/refund_policy.md \</text>
  <text x="102" y="266" class="mono">  --settings settings/evolve.yaml --eval evals/*.yaml</text>
  <text x="74" y="320" class="mono ok">[proposal] kb/proposals/prop_20260511T040118Z_d279900b.md</text>
  <text x="74" y="354" class="mono ok">[gates] passed</text>
  <text x="74" y="388" class="mono ok">[eval] PASS eval_retrieval_execution_first_001: retrieved 1 item</text>
  <text x="74" y="422" class="mono ok">[eval] PASS eval_routing_answer_with_evidence_001: selected answer-with-evidence</text>
  <text x="74" y="486" class="mono accent">$ python -m evolvekb.cli proposal list</text>
  <text x="74" y="532" class="mono warn">pending_review  Ingest refund-policy  -> auditable knowledge update</text>
  <text x="74" y="580" class="mono muted">RAG retrieves text. EvolveKB turns policy into a verifiable behavior loop.</text>
</svg>
